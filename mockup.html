<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thai Trainer – Emojis</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 9 6%22><rect width=%229%22 height=%226%22 fill=%22%23a51931%22/><rect y=%221%22 width=%229%22 height=%224%22 fill=%22%23f4f5f8%22/><rect y=%222%22 width=%229%22 height=%222%22 fill=%22%232d2a4a%22/></svg>" />
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #f5f5f0;
            --bg2: #fff;
            --border: #e8e8e8;
            --border2: #ddd;
            --text: #1a1a1a;
            --text2: #555;
            --text3: #888;
            --text4: #aaa;
            --hover: #f5f5f5;
            --primary: #1a1a1a;
            --primary-text: #fff;
        }

        body.dark {
            --bg: #0f0f0f;
            --bg2: #1c1c1e;
            --border: #2c2c2e;
            --border2: #3a3a3c;
            --text: #f0f0f0;
            --text2: #aaa;
            --text3: #777;
            --text4: #555;
            --hover: #2c2c2e;
            --primary: #f0f0f0;
            --primary-text: #0f0f0f;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            transition: background .2s, color .2s;
        }

        .app {
            max-width: 600px;
            margin: 0 auto;
            padding: 16px;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 4px;
            gap: 8px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        h1 {
            font-size: 20px;
            font-weight: 500;
        }

        .subtitle {
            font-size: 13px;
            color: var(--text3);
            margin-bottom: 24px;
        }

        .header-btns {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .dark-toggle {
            background: none;
            border: 1px solid var(--border2);
            border-radius: 8px;
            padding: 0;
            font-size: 16px;
            line-height: 1;
            cursor: pointer;
            color: var(--text);
            transition: all .15s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
        }

        .dark-toggle:hover {
            background: var(--hover);
        }

        /* Emoji‑Button‑Grid – genau wie „Anhören“ eingerahmt */
        .emoji-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            padding: 12px 0;
        }

        .btn-emoji {
            background: var(--bg2);
            border: 1px solid var(--border2);
            border-radius: 8px;
            padding: 6px 12px;
            font-size: 28px;
            line-height: 1.2;
            cursor: default;
            color: var(--text);
            transition: all .15s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 50px;
            min-height: 50px;
            user-select: none;
        }

        .btn-emoji:hover {
            background: var(--hover);
            transform: scale(1.02);
        }

        /* Für kleinere Bildschirme etwas anpassen */
        @media (max-width: 480px) {
            .btn-emoji {
                font-size: 24px;
                min-width: 44px;
                min-height: 44px;
                padding: 4px 10px;
            }
        }
    </style>
</head>
<body class="dark">

    <div class="app">
        <div class="header">
            <div class="header-left">
                <h1>
                    <svg class="th-flag-icon" viewBox="0 0 9 6" width="22" height="15">
                        <rect width="9" height="6" fill="#a51931" />
                        <rect y="1" width="9" height="4" fill="#f4f5f8" />
                        <rect y="2" width="9" height="2" fill="#2d2a4a" />
                    </svg>
                    Thai Trainer
                </h1>
            </div>
            <div class="header-btns">
                <button class="dark-toggle" onclick="toggleDark()" id="darkBtn">☀️</button>
            </div>
        </div>
        <p class="subtitle">Deine Emoji‑Sammlung</p>

        <!-- Alle gewünschten Emojis als Buttons -->
        <div class="emoji-grid">
            <!-- 1️⃣2️⃣3️⃣4️⃣5️⃣ -->
            <span class="btn-emoji">1️⃣</span>
            <span class="btn-emoji">2️⃣</span>
            <span class="btn-emoji">3️⃣</span>
            <span class="btn-emoji">4️⃣</span>
            <span class="btn-emoji">5️⃣</span>
            <span class="btn-emoji">👤</span>
            
            <span class="btn-emoji">🤍</span>
            <span class="btn-emoji">🩶</span>
            <span class="btn-emoji">🖤</span>
            <span class="btn-emoji">💙</span>
            <span class="btn-emoji">🩵</span>
            <span class="btn-emoji">👤</span>
            
            <span class="btn-emoji">❤️</span>
            <span class="btn-emoji">💛</span>
            <span class="btn-emoji">💚</span>
            <span class="btn-emoji">💙</span>
            <span class="btn-emoji">💜</span>
            <span class="btn-emoji">👤</span>
            
            <span class="btn-emoji">🥭</span>
            <span class="btn-emoji">🌶️</span>
            <span class="btn-emoji">🍉</span>
            <span class="btn-emoji">🥥</span>
            <span class="btn-emoji">🍿</span>
            <span class="btn-emoji">👤</span>
        </div>
    </div>

    <script>
        // ===== Dark Mode =====
        function initDark() {
            if (localStorage.getItem("thai_trainer_dark") === "0") {
                document.body.classList.remove("dark");
                document.getElementById("darkBtn").textContent = "🌙";
            }
        }

        function toggleDark() {
            const d = document.body.classList.toggle("dark");
            document.getElementById("darkBtn").textContent = d ? "☀️" : "🌙";
            try {
                localStorage.setItem("thai_trainer_dark", d ? "1" : "0");
            } catch (_) {}
        }

        initDark();

        // (Optional) Bei Klick auf einen Button kannst du hier eine Aktion einbauen.
        // Momentan sind sie statisch – genau wie gewünscht.
    </script>

</body>
</html>
